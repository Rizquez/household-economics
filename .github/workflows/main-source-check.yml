name: Main Source Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-source-branch:
    name: validate-release-source
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          SOURCE_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          TARGET_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$SOURCE_BRANCH" != "release" ]; then
            echo "::error::main only accepts pull requests from release."
            echo "Received source branch: $SOURCE_BRANCH"
            exit 1
          fi

          if [ "$SOURCE_REPOSITORY" != "$TARGET_REPOSITORY" ]; then
            echo "::error::main does not accept pull requests from forks."
            echo "Received source repository: $SOURCE_REPOSITORY"
            exit 1
          fi

          echo "Valid pull request source: release"