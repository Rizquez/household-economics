services:
  postgres:
    image: postgres:14-alpine
    container_name: household_economics_postgres

    environment:
      POSTGRES_DB: household_economics
      POSTGRES_USER: household_economics
      POSTGRES_PASSWORD: household_economics_password

    ports:
      - "5432:5432"

    volumes:
      - household_economics_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U household_economics -d household_economics",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  household_economics_postgres_data: