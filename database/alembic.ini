# -----------------------------------------------------------------------------------
# Alembic main settings
# -----------------------------------------------------------------------------------
[alembic]
script_location = alembic # Path to the migration scripts
prepend_sys_path = . # Add the current directory to PYTHONPATH to make imports easier

# -----------------------------------------------------------------------------------
# Defining the available loggers
# -----------------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic
# List of loggers to be used:
# - root: main application logger
# - sqlalchemy: SQLAlchemy events and queries
# - alembic: migration execution

# -----------------------------------------------------------------------------------
# Defining handlers
# -----------------------------------------------------------------------------------
[handlers]
keys = console # Handler that will send messages to the console

# -----------------------------------------------------------------------------------
# Definition of formatters
# -----------------------------------------------------------------------------------
[formatters]
keys = generic # Formatter used to display the logs

# -----------------------------------------------------------------------------------
# Root logger (main logger)
# -----------------------------------------------------------------------------------
[logger_root]
level = WARN # Will only display messages with a severity level of WARN or higher
handlers = console # Use the console handler

# -----------------------------------------------------------------------------------
# SQLAlchemy logger
# -----------------------------------------------------------------------------------
[logger_sqlalchemy]
level = WARN # Show only warnings and errors related to SQLAlchemy
qualname = sqlalchemy.engine # Logger associated with the SQLAlchemy database engine

# -----------------------------------------------------------------------------------
# Alembic logger
# -----------------------------------------------------------------------------------
[logger_alembic]
level = INFO # Displays relevant information during migrations
qualname = alembic # Logger associated with Alembic

# -----------------------------------------------------------------------------------
# Console handler
# -----------------------------------------------------------------------------------
[handler_console]
class = StreamHandler # Send the logs to the standard error output (stderr)
args = (sys.stderr,) # StreamHandler Arguments
formatter = generic # Formatter used to display messages

# -----------------------------------------------------------------------------------
# Log output format
# -----------------------------------------------------------------------------------
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
# Example:
# INFO  [alembic] Running upgrade head
# WARN  [sqlalchemy.engine] Connection timeout